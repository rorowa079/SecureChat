<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureChat</title>

  <!-- Firebase Storage SDK (compat) — used when FIREBASE_CONFIG is filled in -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Auth Screen ── */
    #auth-screen {
      background: #16213e;
      border-radius: 12px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #auth-screen h1 { font-size: 1.6rem; margin-bottom: 6px; color: #4fc3f7; }
    #auth-screen p.sub { font-size: 0.82rem; color: #888; margin-bottom: 18px; }
    #conn-indicator { text-align: center; font-size: 0.85rem; margin-bottom: 16px; font-weight: 600; min-height: 18px; }
    #auth-screen input {
      width: 100%; padding: 11px 14px; margin-bottom: 12px;
      background: #0f3460; border: 1px solid #1e5f8e; border-radius: 8px;
      color: #e0e0e0; font-size: 0.95rem; outline: none;
    }
    #auth-screen input:focus { border-color: #4fc3f7; }
    .btn-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn {
      flex: 1; padding: 11px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #4fc3f7; color: #0d1b2a; }
    .btn-secondary { background: #0f3460; color: #4fc3f7; border: 1px solid #4fc3f7; }
    #auth-status { margin-top: 14px; font-size: 0.85rem; min-height: 20px; text-align: center; }
    #keygen-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); align-items: center; justify-content: center;
      flex-direction: column; z-index: 100;
    }
    #keygen-overlay.show { display: flex; }
    #keygen-overlay p { margin-top: 16px; color: #4fc3f7; font-size: 0.95rem; }
    .spinner {
      width: 48px; height: 48px; border: 5px solid #0f3460;
      border-top-color: #4fc3f7; border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Chat Screen ── */
    #chat-screen { display: none; width: 100vw; height: 100vh; flex-direction: row; }
    #chat-screen.show { display: flex; }

    #sidebar {
      width: 220px; background: #16213e; border-right: 1px solid #0f3460;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    #sidebar-header {
      padding: 18px 16px 12px; font-size: 1rem; font-weight: 700;
      color: #4fc3f7; border-bottom: 1px solid #0f3460;
      display: flex; flex-direction: column; gap: 4px;
    }
    #sidebar-header span { font-size: 0.75rem; color: #888; font-weight: 400; }
    #user-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    #user-list li {
      list-style: none; padding: 10px 16px; cursor: pointer;
      border-radius: 6px; margin: 2px 8px; display: flex; align-items: center; gap: 8px;
      transition: background .15s;
    }
    #user-list li:hover, #user-list li.active { background: #0f3460; }
    #user-list li .dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; flex-shrink: 0; }
    #sidebar-logout { padding: 14px 16px; border-top: 1px solid #0f3460; }
    #sidebar-logout button {
      width: 100%; padding: 9px; background: transparent;
      border: 1px solid #555; border-radius: 8px; color: #aaa; cursor: pointer; font-size: 0.85rem;
    }
    #sidebar-logout button:hover { border-color: #e57373; color: #e57373; }

    #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-header {
      padding: 16px 20px; background: #16213e; border-bottom: 1px solid #0f3460;
      font-size: 1rem; font-weight: 600; color: #4fc3f7;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #typing-indicator {
      padding: 2px 20px 6px; font-size: 0.78rem; color: #888;
      min-height: 22px; font-style: italic;
    }
    .bubble {
      max-width: 68%; padding: 10px 14px; border-radius: 12px;
      font-size: 0.9rem; line-height: 1.45; word-break: break-word;
    }
    .bubble.out { align-self: flex-end; background: #0f3460; color: #e0e0e0; border-bottom-right-radius: 3px; }
    .bubble.in  { align-self: flex-start; background: #1e3a5f; color: #e0e0e0; border-bottom-left-radius: 3px; }
    .bubble .meta { font-size: 0.72rem; color: #888; margin-bottom: 4px; }
    .bubble a { color: #4fc3f7; }
    .system-msg { text-align: center; font-size: 0.78rem; color: #666; padding: 4px 0; }

    #input-bar {
      padding: 12px 16px; background: #16213e; border-top: 1px solid #0f3460;
      display: flex; align-items: center; gap: 8px; position: relative;
    }
    #input-bar input[type=text] {
      flex: 1; padding: 10px 14px; background: #0f3460; border: 1px solid #1e5f8e;
      border-radius: 24px; color: #e0e0e0; font-size: 0.9rem; outline: none;
    }
    #input-bar input[type=text]:focus { border-color: #4fc3f7; }
    .icon-btn {
      background: none; border: none; cursor: pointer; font-size: 1.2rem;
      color: #888; padding: 6px; border-radius: 6px; transition: color .15s;
    }
    .icon-btn:hover { color: #4fc3f7; }
    #pending-file-label {
      font-size: 0.78rem; color: #4fc3f7; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 120px;
    }
    .send-btn {
      padding: 9px 18px; background: #4fc3f7; color: #0d1b2a;
      border: none; border-radius: 20px; cursor: pointer; font-weight: 700;
      font-size: 0.9rem; transition: opacity .15s;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:disabled { opacity: .4; cursor: default; }

    #emoji-picker {
      position: absolute; bottom: 62px; left: 16px;
      background: #16213e; border: 1px solid #0f3460; border-radius: 10px;
      padding: 10px; width: 280px; z-index: 50;
      display: none; flex-wrap: wrap; gap: 4px;
    }
    #emoji-picker.show { display: flex; }
    #emoji-picker span {
      font-size: 1.3rem; cursor: pointer; padding: 4px;
      border-radius: 4px; transition: background .1s;
    }
    #emoji-picker span:hover { background: #0f3460; }

    #status-bar {
      padding: 6px 16px; background: #0d1b2a; font-size: 0.75rem;
      color: #888; border-top: 1px solid #0f3460; text-align: center;
    }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <h1>🔒 SecureChat</h1>
  <p class="sub">End-to-end encrypted · RSA-4096 + AES-GCM</p>
  <div id="conn-indicator"></div>
  <input type="text" id="auth-username" placeholder="Username" autocomplete="off">
  <input type="password" id="auth-password" placeholder="Password">
  <div class="btn-row">
    <button class="btn btn-primary"    onclick="authenticate('login')">Login</button>
    <button class="btn btn-secondary"  onclick="authenticate('register')">Register</button>
  </div>
  <div id="auth-status"></div>
</div>

<!-- Key generation overlay -->
<div id="keygen-overlay">
  <div class="spinner"></div>
  <p>Generating RSA-4096 key pair…</p>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div id="sidebar">
    <div id="sidebar-header">
      SecureChat
      <span id="my-name-label"></span>
    </div>
    <ul id="user-list"></ul>
    <div id="sidebar-logout">
      <button onclick="logout()">Disconnect</button>
    </div>
  </div>

  <div id="chat-area">
    <div id="chat-header">Select a user to start chatting</div>
    <div id="messages"></div>
    <div id="typing-indicator"></div>

    <div id="emoji-picker"></div>

    <div id="input-bar">
      <button class="icon-btn" title="Emoji" onclick="toggleEmoji()">😊</button>
      <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(this)">
      <button class="icon-btn" title="Attach file" onclick="document.getElementById('file-input').click()">📎</button>
      <span id="pending-file-label"></span>
      <input type="text" id="msg-input"
             placeholder="Type an end-to-end encrypted message…"
             oninput="onTyping()"
             onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div id="status-bar">Not connected</div>
  </div>
</div>

<script>
// ── Firebase Config ────────────────────────────────────────────────────────
// Fill these in from your Firebase project console (Project Settings → Your apps).
// Leave apiKey as "YOUR_API_KEY" to disable Firebase and send small files inline.
// Storage rules must allow writes: allow read, write: if true;  (for development)
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBW-cqlK2e_HeH4dkuY9kmN6tQmcq9CQMg",
  authDomain:        "chat-bba9f.firebaseapp.com",
  projectId:         "chat-bba9f",
  storageBucket:     "chat-bba9f.firebasestorage.app",
  messagingSenderId: "518675266766",
  appId:             "1:518675266766:web:a23af7bfdb5a201a5ee49f",
  measurementId:     "G-BKTJE8YKXY"
};
const FIREBASE_ENABLED = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
let firebaseStorage = null;
if (FIREBASE_ENABLED) {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    firebaseStorage = firebase.storage();
  } catch (e) {
    console.warn("Firebase init failed:", e);
  }
}

// ── Constants ──────────────────────────────────────────────────────────────
const WS_URL = "wss://localhost:8765";
const EMOJIS = ["😀","😂","😍","🥰","😎","🤔","👍","❤️","🔥","✅","😢","😮","🙏","🎉","💯","😅","🤣","😇","🥳","😜"];
const HEARTBEAT_MS = 30_000;
const TYPING_DEBOUNCE_MS = 600;
const TYPING_CLEAR_MS    = 3000;

// ── State ──────────────────────────────────────────────────────────────────
let ws              = null;
let myUsername      = "";
let myKeyPair       = null;
let selectedUser    = null;
let pendingKeyRes   = {};     // username → { resolve, reject }
let cachedPubKeys   = {};     // username → CryptoKey
let reconnectTimer  = null;
let heartbeatTimer  = null;
let typingSendTimer = null;   // debounce for outgoing typing events
let typingShowTimer = {};     // username → timer id for hiding indicator
let pendingFile     = null;   // { name, data: ArrayBuffer }

// ── Base64 helpers ─────────────────────────────────────────────────────────
function bufToB64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b64ToBuf(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out.buffer;
}

// ── Crypto ─────────────────────────────────────────────────────────────────
async function generateKeyPair() {
  return crypto.subtle.generateKey(
    { name: "RSA-OAEP", modulusLength: 4096, publicExponent: new Uint8Array([1,0,1]), hash: "SHA-256" },
    true, ["encrypt", "decrypt"]
  );
}
async function exportPublicKey(key) {
  return bufToB64(await crypto.subtle.exportKey("spki", key));
}
async function importPublicKey(b64) {
  return crypto.subtle.importKey(
    "spki", b64ToBuf(b64),
    { name: "RSA-OAEP", hash: "SHA-256" },
    false, ["encrypt"]
  );
}

async function encryptForRecipient(recipientPubKey, plainBytes) {
  const aesKey  = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
  const iv      = crypto.getRandomValues(new Uint8Array(12));
  const cipher  = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, plainBytes);
  const rawAes  = await crypto.subtle.exportKey("raw", aesKey);
  const encKey  = await crypto.subtle.encrypt({ name: "RSA-OAEP" }, recipientPubKey, rawAes);
  return { ciphertext: bufToB64(cipher), encryptedKey: bufToB64(encKey), iv: bufToB64(iv) };
}

async function decryptFromSender(encKeyB64, ivB64, cipherB64) {
  const rawAes = await crypto.subtle.decrypt({ name: "RSA-OAEP" }, myKeyPair.privateKey, b64ToBuf(encKeyB64));
  const aesKey = await crypto.subtle.importKey("raw", rawAes, { name: "AES-GCM" }, false, ["decrypt"]);
  return crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(b64ToBuf(ivB64)) }, aesKey, b64ToBuf(cipherB64));
}

// ── Public key fetch (promise-based, cached) ───────────────────────────────
function getRecipientKey(username) {
  if (cachedPubKeys[username]) return Promise.resolve(cachedPubKeys[username]);
  return new Promise((resolve, reject) => {
    pendingKeyRes[username] = { resolve, reject };
    ws.send(JSON.stringify({ type: "get_key", username }));
    setTimeout(() => {
      if (pendingKeyRes[username]) {
        delete pendingKeyRes[username];
        reject(new Error("Key fetch timed out"));
      }
    }, 8000);
  });
}

// ── Firebase file upload ───────────────────────────────────────────────────
async function uploadToFirebase(encryptedBytes, fileName) {
  if (!firebaseStorage) throw new Error("Firebase not configured");
  const unique = `${Date.now()}-${Math.random().toString(36).slice(2,9)}-${fileName}.enc`;
  const ref = firebaseStorage.ref(`encrypted/${unique}`);
  await ref.put(new Blob([encryptedBytes]));
  return ref.getDownloadURL();
}

// ── WebSocket & heartbeat ──────────────────────────────────────────────────
function connect() {
  if (ws && ws.readyState <= WebSocket.OPEN) return;
  setConnIndicator("🟡 Connecting…", "#f0c040");
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConnIndicator("🟢 Connected", "#4caf50");
    clearTimeout(reconnectTimer);
    clearInterval(heartbeatTimer);
    heartbeatTimer = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "ping" }));
      }
    }, HEARTBEAT_MS);
  };

  ws.onmessage = async (evt) => {
    // Ignore bare string pongs (protocol-level)
    if (evt.data === "pong") return;
    let data;
    try { data = JSON.parse(evt.data); } catch { return; }
    await handleServerMessage(data);
  };

  ws.onclose = () => {
    setConnIndicator("🔴 Disconnected — reconnecting in 5s…", "#e57373");
    setStatus("Disconnected — reconnecting…");
    clearInterval(heartbeatTimer);
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = () => ws.close();
}

// ── Message dispatcher ─────────────────────────────────────────────────────
async function handleServerMessage(data) {
  if (data.type === "pong") return;

  if (data.type === "typing") {
    showTypingIndicator(data.from);
    return;
  }

  if (data.type === "user_list") {
    renderUserList(data.users);
    return;
  }

  if (data.type === "key_uploaded") return;

  if (data.type === "public_key") {
    try {
      const key = await importPublicKey(data.publicKey);
      cachedPubKeys[data.username] = key;
      pendingKeyRes[data.username]?.resolve(key);
    } catch (e) {
      pendingKeyRes[data.username]?.reject(e);
    }
    delete pendingKeyRes[data.username];
    return;
  }

  if (data.type === "message") {
    await receiveMessage(data);
    return;
  }

  if (data.status === "error") {
    // Show on auth screen if not yet logged in, otherwise as system message
    if (document.getElementById("auth-screen").style.display !== "none") {
      showAuthStatus(data.message, "#e57373");
    } else {
      addSystemMsg("⚠ " + data.message);
    }
    return;
  }

  if (data.status === "success") {
    if (data.message === "Authentication successful.") {
      await onAuthenticated();
    } else {
      showAuthStatus(data.message, "#4caf50");
    }
  }
}

// ── Auth ───────────────────────────────────────────────────────────────────
async function authenticate(action) {
  const user = document.getElementById("auth-username").value.trim();
  const pass = document.getElementById("auth-password").value;
  if (!user || !pass) { showAuthStatus("Enter username and password.", "orange"); return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { showAuthStatus("Not connected to server.", "#e57373"); return; }

  if (action === "register") {
    showAuthStatus("Registering…", "#4fc3f7");
    ws.send(JSON.stringify({ action: "register", username: user, password: pass }));
    return;
  }

  document.getElementById("keygen-overlay").classList.add("show");
  try {
    myKeyPair = await generateKeyPair();
  } catch {
    document.getElementById("keygen-overlay").classList.remove("show");
    showAuthStatus("Key generation failed.", "#e57373");
    return;
  }
  document.getElementById("keygen-overlay").classList.remove("show");
  myUsername = user;
  ws.send(JSON.stringify({ action: "login", username: user, password: pass }));
}

async function onAuthenticated() {
  const pubB64 = await exportPublicKey(myKeyPair.publicKey);
  ws.send(JSON.stringify({ type: "upload_key", publicKey: pubB64 }));

  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("chat-screen").classList.add("show");
  document.getElementById("my-name-label").textContent = "You: " + myUsername;
  setStatus("🔒 End-to-end encrypted");
  addSystemMsg("Connected. RSA-4096 key pair generated and uploaded.");
}

function logout() {
  clearInterval(heartbeatTimer);
  if (ws) ws.close();
  location.reload();
}

// ── Typing indicator ───────────────────────────────────────────────────────
function onTyping() {
  clearTimeout(typingSendTimer);
  if (!selectedUser || !ws || ws.readyState !== WebSocket.OPEN) return;
  typingSendTimer = setTimeout(() => {
    ws.send(JSON.stringify({ type: "typing", to: selectedUser }));
  }, TYPING_DEBOUNCE_MS);
}

function showTypingIndicator(from) {
  if (from !== selectedUser) return;
  document.getElementById("typing-indicator").textContent = `${from} is typing…`;
  clearTimeout(typingShowTimer[from]);
  typingShowTimer[from] = setTimeout(() => {
    document.getElementById("typing-indicator").textContent = "";
  }, TYPING_CLEAR_MS);
}

// ── Sending ────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = document.getElementById("msg-input").value.trim();
  if (!selectedUser) { alert("Select a user from the sidebar first."); return; }
  if (!text && !pendingFile) return;

  const btn = document.getElementById("send-btn");
  btn.disabled = true;

  try {
    const recipientKey = await getRecipientKey(selectedUser);

    if (pendingFile) {
      if (FIREBASE_ENABLED && firebaseStorage) {
        // Encrypt the file then store the encrypted blob on Firebase
        const enc = await encryptForRecipient(recipientKey, pendingFile.data);
        const rawCipher = b64ToBuf(enc.ciphertext);
        const url = await uploadToFirebase(rawCipher, pendingFile.name);
        ws.send(JSON.stringify({
          type: "message", to: selectedUser,
          contentType: "file", fileName: pendingFile.name,
          encryptedKey: enc.encryptedKey, iv: enc.iv,
          fileUrl: url
        }));
      } else {
        // Firebase not configured — send encrypted bytes inline (small files only)
        const enc = await encryptForRecipient(recipientKey, pendingFile.data);
        ws.send(JSON.stringify({
          type: "message", to: selectedUser,
          contentType: "file", fileName: pendingFile.name,
          ...enc
        }));
      }
      addBubble("out", `📎 ${escapeHtml(pendingFile.name)}`);
      pendingFile = null;
      document.getElementById("file-input").value = "";
      document.getElementById("pending-file-label").textContent = "";
    }

    if (text) {
      const bytes = new TextEncoder().encode(text);
      const enc = await encryptForRecipient(recipientKey, bytes);
      ws.send(JSON.stringify({ type: "message", to: selectedUser, contentType: "text", ...enc }));
      addBubble("out", escapeHtml(text));
      document.getElementById("msg-input").value = "";
    }
  } catch (e) {
    addSystemMsg("⚠ Could not send: " + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function receiveMessage(data) {
  // Clear typing indicator from sender
  document.getElementById("typing-indicator").textContent = "";
  clearTimeout(typingShowTimer[data.from]);

  try {
    if (data.contentType === "file") {
      if (data.fileUrl) {
        // Fetch the encrypted blob from Firebase, decrypt, offer download
        const resp = await fetch(data.fileUrl);
        const encBytes = await resp.arrayBuffer();
        // Re-encode fetched blob to base64 so decryptFromSender can handle it
        const encB64 = bufToB64(encBytes);
        const plain = await decryptFromSender(data.encryptedKey, data.iv, encB64);
        offerFileDownload(plain, data.fileName, data.from);
      } else {
        // Inline fallback
        const plain = await decryptFromSender(data.encryptedKey, data.iv, data.ciphertext);
        offerFileDownload(plain, data.fileName, data.from);
      }
    } else {
      const plain = await decryptFromSender(data.encryptedKey, data.iv, data.ciphertext);
      const text  = new TextDecoder().decode(plain);
      addBubble("in", escapeHtml(text), data.from);
    }
  } catch {
    addBubble("in", "<em style='color:#e57373'>[Decryption failed — key mismatch?]</em>", data.from);
  }
}

function offerFileDownload(plainBuf, fileName, from) {
  const url  = URL.createObjectURL(new Blob([plainBuf]));
  const link = `<a href="${url}" download="${escapeHtml(fileName || 'file')}">📎 ${escapeHtml(fileName || 'file')}</a>`;
  addBubble("in", link, from);
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingFile = { name: file.name, data: e.target.result };
    document.getElementById("pending-file-label").textContent = `📎 ${file.name}`;
  };
  reader.readAsArrayBuffer(file);
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function renderUserList(users) {
  const ul = document.getElementById("user-list");
  ul.innerHTML = "";
  users.forEach(u => {
    if (u === myUsername) return;
    const li = document.createElement("li");
    if (u === selectedUser) li.classList.add("active");
    li.innerHTML = `<span class="dot"></span>${escapeHtml(u)}`;
    li.onclick = () => selectUser(u);
    ul.appendChild(li);
  });
}

function selectUser(username) {
  selectedUser = username;
  document.getElementById("chat-header").textContent = `🔒 Chat with ${username}`;
  document.querySelectorAll("#user-list li").forEach(li =>
    li.classList.toggle("active", li.textContent.trim() === username)
  );
  document.getElementById("typing-indicator").textContent = "";
}

function addBubble(dir, htmlContent, from) {
  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = "bubble " + dir;
  const meta = dir === "in" && from ? `<div class="meta">${escapeHtml(from)}</div>` : "";
  div.innerHTML = meta + htmlContent;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystemMsg(text) {
  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = "system-msg";
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(text) {
  document.getElementById("status-bar").textContent = text;
}

function setConnIndicator(text, color) {
  const el = document.getElementById("conn-indicator");
  el.textContent = text;
  el.style.color = color;
}

function showAuthStatus(msg, color) {
  const el = document.getElementById("auth-status");
  el.textContent = msg;
  el.style.color = color;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Emoji picker ───────────────────────────────────────────────────────────
(function buildEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  EMOJIS.forEach(e => {
    const span = document.createElement("span");
    span.textContent = e;
    span.onclick = () => {
      document.getElementById("msg-input").value += e;
      document.getElementById("msg-input").focus();
    };
    picker.appendChild(span);
  });
})();

function toggleEmoji() {
  document.getElementById("emoji-picker").classList.toggle("show");
}

document.addEventListener("click", (e) => {
  if (!e.target.closest("#emoji-picker") && !e.target.closest(".icon-btn[title='Emoji']")) {
    document.getElementById("emoji-picker").classList.remove("show");
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
